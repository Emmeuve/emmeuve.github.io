name: Update Behance Projects

on:
  schedule:
    # Ejecutar todos los días a las 6 AM UTC (3 AM Chile)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permitir ejecución manual desde GitHub
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-behance.yml'

# Permisos necesarios para el workflow
permissions:
  contents: write
  actions: read

jobs:
  update-behance:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📦 Install dependencies
        run: |
          npm init -y
          npm install xml2js node-fetch@2
      
      - name: 🎨 Fetch Behance Projects
        run: |
          node << 'EOF'
          const fetch = require('node-fetch');
          const xml2js = require('xml2js');
          const fs = require('fs');
          const path = require('path');
          
          const username = 'Emmeuve';
          const maxProjects = 12;

          // Espera entre requests para no hacer spam
          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          // Obtener og:image de la página del proyecto en Behance
          async function fetchProjectImage(projectUrl) {
            try {
              const res = await fetch(projectUrl, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'es-CL,es;q=0.9,en;q=0.8'
                },
                timeout: 10000
              });

              if (!res.ok) return '';

              const html = await res.text();

              // Buscar og:image (imagen principal del proyecto)
              const ogMatch = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                           || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);

              if (ogMatch && ogMatch[1]) {
                console.log(`  ✅ og:image encontrada`);
                return ogMatch[1];
              }

              return '';
            } catch (err) {
              console.warn(`  ⚠️ No se pudo obtener imagen: ${err.message}`);
              return '';
            }
          }
          
          (async () => {
            try {
              console.log('🔍 Fetching Behance RSS feed...');
              
              const response = await fetch(
                `https://www.behance.net/feeds/user?username=${username}`,
                {
                  headers: {
                    'User-Agent': 'Mozilla/5.0 (compatible; BehanceBot/1.0)'
                  }
                }
              );
              
              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }
              
              const xmlData = await response.text();
              console.log('✅ RSS feed fetched successfully');
              
              const parser = new xml2js.Parser();
              const result = await parser.parseStringPromise(xmlData);
              
              if (!result.rss || !result.rss.channel || !result.rss.channel[0].item) {
                throw new Error('Invalid RSS structure');
              }
              
              const items = result.rss.channel[0].item;
              console.log(`📊 Found ${items.length} projects`);
              
              const projects = [];

              for (let index = 0; index < Math.min(items.length, maxProjects); index++) {
                const item = items[index];
                const content = item.description ? item.description[0] : '';
                const projectUrl = item.link ? item.link[0] : '';
                const title = item.title ? item.title[0] : 'Untitled Project';

                console.log(`\n🖼️ [${index + 1}/${Math.min(items.length, maxProjects)}] "${title}"`);

                // Intentar obtener imagen desde el contenido del RSS primero
                let imageUrl = '';
                const imgMatches = content.match(/<img[^>]+src="([^">]+)"/g);

                if (imgMatches && imgMatches.length > 0) {
                  const firstImg = imgMatches[0].match(/src="([^">]+)"/);
                  if (firstImg) {
                    imageUrl = firstImg[1]
                      .replace('/404/', '/original/')
                      .replace('_404.', '_original.')
                      .split('?')[0];
                    console.log(`  ✅ Imagen desde RSS`);
                  }
                }

                // Si no hay imagen en el RSS, hacer fetch de la página para obtener og:image
                if (!imageUrl && projectUrl) {
                  console.log(`  🔎 Buscando og:image en página del proyecto...`);
                  imageUrl = await fetchProjectImage(projectUrl);
                  await sleep(800); // Pausa para no ser bloqueado
                }

                // Limpiar descripción de HTML
                const cleanDesc = content
                  .replace(/<[^>]*>/g, '')
                  .replace(/&nbsp;/g, ' ')
                  .replace(/&amp;/g, '&')
                  .replace(/&quot;/g, '"')
                  .replace(/&apos;/g, "'")
                  .trim()
                  .substring(0, 150);
                
                projects.push({
                  id: `behance-project-${index + 1}`,
                  title,
                  link: projectUrl,
                  description: cleanDesc || 'Ver proyecto en Behance',
                  image: imageUrl,
                  pubDate: item.pubDate ? item.pubDate[0] : new Date().toISOString(),
                  source: 'behance'
                });
              }
              
              const data = {
                lastUpdate: new Date().toISOString(),
                username: username,
                totalProjects: projects.length,
                projects: projects
              };
              
              // Resumen
              const withImages = projects.filter(p => p.image).length;
              console.log(`\n📊 Resumen:`);
              console.log(`  ✅ Proyectos con imagen: ${withImages}`);
              console.log(`  ⚠️ Proyectos sin imagen: ${projects.length - withImages}`);
              
              // Guardar JSON
              const dataDir = path.join(process.cwd(), 'assets', 'data');
              if (!fs.existsSync(dataDir)) {
                fs.mkdirSync(dataDir, { recursive: true });
              }
              
              const filePath = path.join(dataDir, 'behance-projects.json');
              fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
              
              console.log('\n✅ Projects saved to:', filePath);
              console.log(`📁 Total projects saved: ${projects.length}`);
              console.log('🎉 Update completed successfully!');
              
            } catch (error) {
              console.error('❌ Error:', error.message);
              console.error('Stack:', error.stack);
              process.exit(1);
            }
          })();
          EOF
      
      - name: 📤 Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add assets/data/behance-projects.json
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "🤖 Update Behance projects [automated]"
          
          max_attempts=3
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "📤 Attempting push (attempt $attempt/$max_attempts)..."
            
            if git push origin main; then
              echo "✅ Changes pushed successfully"
              exit 0
            fi
            
            echo "⚠️ Push failed, retrying in 5 seconds..."
            sleep 5
            attempt=$((attempt + 1))
          done
          
          echo "❌ Failed to push after $max_attempts attempts"
          exit 1
      
      - name: 📊 Summary
        if: always()
        run: |
          echo "### 🎨 Behance Projects Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Username:** Emmeuve" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          
          if [ -f assets/data/behance-projects.json ]; then
            PROJECTS_COUNT=$(cat assets/data/behance-projects.json | grep -o '"totalProjects":[0-9]*' | grep -o '[0-9]*' || echo "0")
            echo "- **Projects Found:** $PROJECTS_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
